title: "Ziyun's Blog "
author:
  name: "Ziyun Guo"
  github: "ZiyunGuo-Sec"
description: >-
  Ziyun's personal blog — security research, learning notes, and life.
baseurl: ""
url: "https://ziyunguo-sec.github.io"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 8
paginate_path: "/blog/page:num/"

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - styles.css
